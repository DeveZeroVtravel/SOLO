services:
  # Giả lập VM-AI
  ollama-service:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_HOST=0.0.0.0

  # Giả lập VM-APP
  vibe-app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_OLLAMA_URL=http://ollama-service:11434 # Kết nối nội bộ Docker
      - FIREBASE_API_KEY=${FIREBASE_API_KEY}
    depends_on:
      - ollama-service

volumes:
  ollama_data:
